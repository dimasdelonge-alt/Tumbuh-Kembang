<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tumbang">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tumbang</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #F8F9FA;
      margin: 0;
      overflow: hidden;
    }
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #F8F9FA;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .logo-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }
    .loading-logo {
      width: 140px;
      height: 140px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      z-index: 2;
    }
    /* Modern spinner ring */
    .spinner-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 160px;
      height: 160px;
      border-radius: 30px;
      border: 4px solid transparent;
      border-top-color: #0148A0;
      border-bottom-color: #4CAF50;
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      z-index: 1;
    }
    .spinner-ring::before {
      content: "";
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      bottom: 5px;
      border-radius: 25px;
      border: 4px solid transparent;
      border-left-color: #FF9800;
      border-right-color: #E91E63;
      animation: spin 2s linear infinite reverse;
    }
    .loading-text {
      margin-top: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 16px;
      color: #0148A0;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: fadeInOut 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>
  <div id="loading-container">
    <img src="loading.jpeg" alt="Logo Tumbang" class="loading-logo" style="animation: pulse 2s infinite;" />
    <lottie-player src="baby_loading.json" background="transparent" speed="1" style="width: 150px; height: 150px; margin-top: 10px;" loop autoplay></lottie-player>
    <div class="loading-text">Menyiapkan Aplikasi...</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Unregistered old service worker');
        }
      });
    }

    // Use MutationObserver to detect when Flutter adds its canvas to the DOM
    const observer = new MutationObserver(function(mutations) {
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.tagName && (node.tagName.toLowerCase() === 'flutter-view' || node.tagName.toLowerCase() === 'flt-glass-pane')) {
            const loader = document.getElementById("loading-container");
            if (loader) {
              // Wait a tiny bit for Flutter to render the first frame
              setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.remove(), 500);
              }, 500);
            }
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
