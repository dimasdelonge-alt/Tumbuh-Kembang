<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tumbang">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tumbang</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #F8F9FA;
      margin: 0;
      overflow: hidden;
    }
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #F8F9FA;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    .loading-logo {
      width: 150px;
      height: 150px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    .runner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }
    .runner {
      font-size: 45px;
      /* Simple bouncing run animation */
      animation: bounceRun 0.6s infinite alternate cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .loading-text {
      margin-top: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 16px;
      color: #0148A0;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes bounceRun {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-15px) rotate(5deg); }
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <img src="loading.jpeg" alt="Logo Tumbang" class="loading-logo" />
    <div class="runner-container">
      <div class="runner">🏃🏽‍♂️</div>
      <div class="loading-text">Menyiapkan Aplikasi<span class="dots"></span></div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Unregistered old service worker');
        }
      });
    }

    // Remove the loading screen once Flutter has rendered the first frame
    document.addEventListener("flutter-first-frame", function() {
      const loader = document.getElementById("loading-container");
      if (loader) {
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 500); // Wait for fade out transition
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
